<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXAM Bank — 문항 보관소</title>
  <meta name="description" content="문항 단위로 정리한 시험 문제 · 정답 · 풀이 보관소" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap">

  <!-- Design tokens FIRST, then component styles -->
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <a class="skip-link" href="#grid">본문으로 건너뛰기</a>

  <!-- ============================================================
       Inline SVG icon sprite (no emoji · stroke=currentColor)
       ============================================================ -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-book" viewBox="0 0 24 24">
        <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15H6.5A2.5 2.5 0 0 0 4 20.5z"/>
        <path d="M4 20.5A2.5 2.5 0 0 1 6.5 18H20"/>
      </symbol>
      <symbol id="i-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
      </symbol>
      <symbol id="i-file" viewBox="0 0 24 24">
        <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/>
        <path d="M14 3v5h5"/><path d="M9 13h6"/><path d="M9 17h6"/>
      </symbol>
      <symbol id="i-external" viewBox="0 0 24 24">
        <path d="M14 4h6v6"/><path d="M20 4 10 14"/>
        <path d="M18 14v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4"/>
      </symbol>
      <symbol id="i-download" viewBox="0 0 24 24">
        <path d="M12 4v11"/><path d="m7 11 5 5 5-5"/><path d="M5 20h14"/>
      </symbol>
      <symbol id="i-x" viewBox="0 0 24 24">
        <path d="M6 6 18 18"/><path d="M18 6 6 18"/>
      </symbol>
      <symbol id="i-arrow-up-down" viewBox="0 0 24 24">
        <path d="M7 4v16"/><path d="m4 7 3-3 3 3"/><path d="M17 20V4"/><path d="m14 17 3 3 3-3"/>
      </symbol>
      <symbol id="i-check" viewBox="0 0 24 24">
        <path d="m5 12 5 5L20 7"/>
      </symbol>
      <symbol id="i-github" viewBox="0 0 24 24">
        <path d="M9 19c-4.5 1.5-4.5-2.5-6-3m12 5v-3.5a3 3 0 0 0-.9-2.3c3-.3 6-1.5 6-6.5a5 5 0 0 0-1.4-3.5 4.6 4.6 0 0 0-.1-3.5s-1.1-.3-3.6 1.4a12.3 12.3 0 0 0-6.5 0C6.5 1.1 5.4 1.4 5.4 1.4a4.6 4.6 0 0 0-.1 3.5A5 5 0 0 0 4 8.4c0 5 3 6.2 6 6.5a3 3 0 0 0-.9 2.3V21"/>
      </symbol>
    </defs>
  </svg>

  <!-- ============================================================
       Header
       ============================================================ -->
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="./" aria-label="EXAM Bank 홈">
        <svg class="brand-mark" aria-hidden="true"><use href="#i-book"/></svg>
        <span class="brand-text">
          <span class="brand-word" id="brand-title">EXAM Bank</span>
          <span class="tagline" id="brand-sub">문항 보관소</span>
        </span>
      </a>
      <div class="search" role="search">
        <svg class="search-icon" aria-hidden="true"><use href="#i-search"/></svg>
        <label for="search" class="visually-hidden">문항 검색</label>
        <input id="search" type="search"
               placeholder="문항 번호 · 본문 · 정답으로 검색…"
               autocomplete="off" spellcheck="false" />
        <button id="search-clear" class="search-clear" type="button" hidden aria-label="검색어 지우기">
          <svg class="icon icon-sm" aria-hidden="true"><use href="#i-x"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ============================================================
       Main
       ============================================================ -->
  <main class="wrap" id="main">
    <!-- Toolbar: group chips + sort -->
    <div class="toolbar">
      <nav class="filters" id="group-filters" aria-label="그룹 필터"></nav>
      <button id="sort-toggle" class="sort-btn" type="button" aria-pressed="false">
        <svg class="icon icon-sm" aria-hidden="true"><use href="#i-arrow-up-down"/></svg>
        <span id="sort-label">그룹·번호순</span>
      </button>
    </div>

    <p class="count" id="result-count" aria-live="polite"></p>

    <!-- Question grid -->
    <section class="grid" id="grid" aria-label="문항 목록" tabindex="-1"></section>

    <!-- Loading skeleton -->
    <div class="skeleton-grid" id="skeleton" aria-hidden="true">
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
    </div>

    <!-- Empty / error / no-results -->
    <div class="empty" id="empty" hidden>
      <h2>등록된 문항이 없어요</h2>
      <p>데이터 빌더로 <code>data/db.json</code>을 생성한 뒤 다시 열어 주세요.</p>
    </div>

    <div class="empty" id="load-error" hidden>
      <h2>데이터를 불러오지 못했어요</h2>
      <p><code>data/db.json</code>을 찾을 수 없거나 형식이 올바르지 않습니다.</p>
    </div>

    <div class="empty" id="no-results" hidden>
      <h2>검색 결과가 없어요</h2>
      <p>다른 번호·키워드나 그룹으로 다시 시도해 보세요.</p>
    </div>
  </main>

  <!-- ============================================================
       Footer
       ============================================================ -->
  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span id="footer-line"></span>
      <a id="repo-link" href="https://github.com/Runfekim/exam-bank" target="_blank" rel="noopener">
        <svg class="icon icon-sm" aria-hidden="true"><use href="#i-github"/></svg>
        GitHub 저장소
      </a>
    </div>
  </footer>

  <!-- ============================================================
       Question detail modal (filled by JS)
       ============================================================ -->
  <div class="detail" id="detail" hidden role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <div class="detail-backdrop" id="detail-backdrop"></div>
    <div class="detail-panel" role="document">
      <header class="detail-head">
        <div class="detail-head-main">
          <span class="badge badge-num" id="detail-num"></span>
          <span class="badge badge-answer" id="detail-answer" hidden></span>
        </div>
        <div class="detail-head-actions">
          <a id="detail-source" class="btn ghost" href="#" target="_blank" rel="noopener">
            <svg class="icon icon-sm" aria-hidden="true"><use href="#i-external"/></svg>
            <span class="label" id="detail-source-label">원본 문제 PDF</span>
          </a>
          <button id="detail-close" class="btn close" type="button" aria-label="닫기">
            <svg class="icon" aria-hidden="true"><use href="#i-x"/></svg>
          </button>
        </div>
      </header>

      <h2 class="visually-hidden" id="detail-title">문항 상세</h2>

      <div class="detail-body" id="detail-body">
        <!-- Question image -->
        <figure class="detail-figure">
          <img id="detail-image" alt="" />
        </figure>

        <!-- Solution region -->
        <section class="solution" aria-labelledby="solution-heading">
          <div class="solution-head">
            <h3 id="solution-heading">풀이</h3>
            <a id="solution-pdf-link" class="btn ghost btn-sm" href="#" target="_blank" rel="noopener" hidden>
              <svg class="icon icon-sm" aria-hidden="true"><use href="#i-file"/></svg>
              <span class="label">원본 풀이 PDF</span>
            </a>
          </div>
          <div id="solution-content" class="solution-content"></div>
        </section>
      </div>
    </div>
  </div>

  <!-- ============================================================
       CDN libs for solution rendering (markdown + LaTeX)
       Loaded with defer; app.js guards for readiness.
       ============================================================ -->
  <script>
    // MathJax must be configured BEFORE the library loads.
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: { fontCache: 'global' },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
        ignoreHtmlClass: 'tex2jax_ignore'
      },
      startup: { typeset: false }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script defer id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-svg.js"></script>

  <script defer src="assets/app.js"></script>
</body>
</html>
