<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXAM Bank — 문제집 · 풀이 PDF 보관소</title>
  <meta name="description" content="문제집과 풀이 PDF를 세트별로 모아 보는 보관소" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap">

  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <!-- ============================================================
       Inline SVG icon sprite (no emoji · stroke=currentColor)
       ============================================================ -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-book" viewBox="0 0 24 24">
        <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15H6.5A2.5 2.5 0 0 0 4 20.5z"/>
        <path d="M4 20.5A2.5 2.5 0 0 1 6.5 18H20"/>
      </symbol>
      <symbol id="i-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
      </symbol>
      <symbol id="i-file" viewBox="0 0 24 24">
        <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/>
        <path d="M14 3v5h5"/><path d="M9 13h6"/><path d="M9 17h6"/>
      </symbol>
      <symbol id="i-external" viewBox="0 0 24 24">
        <path d="M14 4h6v6"/><path d="M20 4 10 14"/>
        <path d="M18 14v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4"/>
      </symbol>
      <symbol id="i-download" viewBox="0 0 24 24">
        <path d="M12 4v11"/><path d="m7 11 5 5 5-5"/><path d="M5 20h14"/>
      </symbol>
      <symbol id="i-x" viewBox="0 0 24 24">
        <path d="M6 6 18 18"/><path d="M18 6 6 18"/>
      </symbol>
      <symbol id="i-chevron-down" viewBox="0 0 24 24">
        <path d="m6 9 6 6 6-6"/>
      </symbol>
      <symbol id="i-arrow-left" viewBox="0 0 24 24">
        <path d="M19 12H5"/><path d="m11 6-6 6 6 6"/>
      </symbol>
      <symbol id="i-github" viewBox="0 0 24 24">
        <path d="M9 19c-4.5 1.5-4.5-2.5-6-3m12 5v-3.5a3 3 0 0 0-.9-2.3c3-.3 6-1.5 6-6.5a5 5 0 0 0-1.4-3.5 4.6 4.6 0 0 0-.1-3.5s-1.1-.3-3.6 1.4a12.3 12.3 0 0 0-6.5 0C6.5 1.1 5.4 1.4 5.4 1.4a4.6 4.6 0 0 0-.1 3.5A5 5 0 0 0 4 8.4c0 5 3 6.2 6 6.5a3 3 0 0 0-.9 2.3V21"/>
      </symbol>
    </defs>
  </svg>

  <!-- ============================================================
       Header
       ============================================================ -->
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="./" aria-label="EXAM Bank 홈">
        <svg class="brand-mark" aria-hidden="true"><use href="#i-book"/></svg>
        <span class="brand-text">
          <span class="brand-word">EXAM Bank</span>
          <span class="tagline">문제집 · 풀이 PDF 보관소</span>
        </span>
      </a>
      <div class="search">
        <svg class="search-icon" aria-hidden="true"><use href="#i-search"/></svg>
        <label for="search" class="visually-hidden">세트 검색</label>
        <input id="search" type="search" placeholder="제목 · 과목 · 태그 검색…" autocomplete="off" />
      </div>
    </div>
  </header>

  <!-- ============================================================
       Library
       ============================================================ -->
  <main class="wrap" id="library">
    <nav class="filters" id="subject-filters" aria-label="과목 필터"></nav>

    <p class="count" id="result-count" aria-live="polite"></p>

    <section class="grid" id="grid"></section>

    <div class="skeleton-grid" id="skeleton" aria-hidden="true">
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
    </div>

    <div class="empty" id="empty" hidden>
      <h2>아직 등록된 세트가 없어요</h2>
      <p>
        <code>pdfs/&lt;세트이름&gt;/</code> 폴더에 문제지 PDF를,<br />
        <code>pdfs/&lt;세트이름&gt;/&lt;그룹&gt;/</code> 폴더에 풀이 PDF를 넣고 push 하면<br />
        목록이 자동으로 채워집니다. 자세한 사용법은 <code>README.md</code> 참고.
      </p>
    </div>

    <div class="empty" id="no-results" hidden>
      <h2>검색 결과가 없어요</h2>
      <p>다른 키워드나 과목으로 다시 시도해 보세요.</p>
    </div>
  </main>

  <!-- ============================================================
       Footer
       ============================================================ -->
  <footer class="site-footer">
    <div class="wrap">
      <span id="total-line"></span>
      <a id="repo-link" href="#" target="_blank" rel="noopener">
        <svg class="icon icon-sm" aria-hidden="true"><use href="#i-github"/></svg>
        GitHub 저장소
      </a>
    </div>
  </footer>

  <!-- ============================================================
       Set detail overlay (filled by JS)
       ============================================================ -->
  <div class="detail" id="detail" hidden role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <div class="wrap" id="detail-body"></div>
  </div>

  <!-- ============================================================
       PDF viewer modal
       ============================================================ -->
  <div class="modal" id="viewer" hidden role="dialog" aria-modal="true" aria-labelledby="viewer-title">
    <div class="modal-bar">
      <span class="modal-title" id="viewer-title"></span>
      <div class="modal-actions">
        <a id="viewer-open" href="#" target="_blank" rel="noopener" class="btn ghost">
          <svg class="icon icon-sm" aria-hidden="true"><use href="#i-external"/></svg>
          <span class="label">새 탭에서 열기</span>
        </a>
        <a id="viewer-download" href="#" download class="btn ghost">
          <svg class="icon icon-sm" aria-hidden="true"><use href="#i-download"/></svg>
          <span class="label">다운로드</span>
        </a>
        <button id="viewer-close" class="btn close" aria-label="닫기">
          <svg class="icon" aria-hidden="true"><use href="#i-x"/></svg>
        </button>
      </div>
    </div>
    <iframe id="viewer-frame" title="PDF 미리보기"></iframe>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
